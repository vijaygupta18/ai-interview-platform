<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1b4b">How InterviewAI Works</text>

  <!-- Step 1: Create -->
  <g filter="url(#shadow)">
    <rect x="20" y="60" width="170" height="80" rx="10" fill="white" stroke="#e5e7eb"/>
    <circle cx="45" cy="80" r="12" fill="url(#indigo)"/>
    <text x="45" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>
    <text x="65" y="83" font-size="12" font-weight="600" fill="#1f2937">Create Interview</text>
    <text x="30" y="103" font-size="10" fill="#6b7280">Upload resume, set role,</text>
    <text x="30" y="116" font-size="10" fill="#6b7280">add questions &amp; context</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="190" y1="100" x2="220" y2="100" stroke="#4f46e5" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="220,95 230,100 220,105" fill="#4f46e5"/>

  <!-- Step 2: Share Link -->
  <g filter="url(#shadow)">
    <rect x="230" y="60" width="150" height="80" rx="10" fill="white" stroke="#e5e7eb"/>
    <circle cx="255" cy="80" r="12" fill="url(#indigo)"/>
    <text x="255" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>
    <text x="275" y="83" font-size="12" font-weight="600" fill="#1f2937">Share Link</text>
    <text x="240" y="103" font-size="10" fill="#6b7280">Magic link sent via</text>
    <text x="240" y="116" font-size="10" fill="#6b7280">email to candidate</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="380" y1="100" x2="410" y2="100" stroke="#4f46e5" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="410,95 420,100 410,105" fill="#4f46e5"/>

  <!-- Step 3: Consent -->
  <g filter="url(#shadow)">
    <rect x="420" y="60" width="160" height="80" rx="10" fill="white" stroke="#e5e7eb"/>
    <circle cx="445" cy="80" r="12" fill="url(#indigo)"/>
    <text x="445" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>
    <text x="465" y="83" font-size="12" font-weight="600" fill="#1f2937">Consent &amp; Setup</text>
    <text x="430" y="103" font-size="10" fill="#6b7280">Camera, mic, screen</text>
    <text x="430" y="116" font-size="10" fill="#6b7280">share + consent check</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="580" y1="100" x2="610" y2="100" stroke="#4f46e5" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="610,95 620,100 610,105" fill="#4f46e5"/>

  <!-- Step 4: Live Interview (big box) -->
  <g filter="url(#shadow)">
    <rect x="620" y="55" width="165" height="90" rx="10" fill="#4f46e5"/>
    <circle cx="645" cy="75" r="12" fill="white"/>
    <text x="645" y="79" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">4</text>
    <text x="665" y="78" font-size="12" font-weight="700" fill="white">Live Interview</text>
    <text x="630" y="98" font-size="9" fill="#c7d2fe">AI asks questions via voice</text>
    <text x="630" y="111" font-size="9" fill="#c7d2fe">Candidate responds live</text>
    <text x="630" y="124" font-size="9" fill="#c7d2fe">Proctoring monitors</text>

    <!-- Pulsing dot -->
    <circle cx="770" cy="68" r="4" fill="#22c55e">
      <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="755" y="72" font-size="7" fill="#bbf7d0">LIVE</text>
  </g>

  <!-- Voice Loop (center area) -->
  <g transform="translate(150, 180)">
    <rect width="500" height="150" rx="12" fill="white" stroke="#e5e7eb" filter="url(#shadow)"/>
    <text x="250" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Voice Conversation Loop</text>

    <!-- Candidate speaks -->
    <rect x="20" y="40" width="110" height="45" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="75" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#15803d">Candidate</text>
    <text x="75" y="72" text-anchor="middle" font-size="9" fill="#15803d">speaks</text>

    <!-- Arrow -->
    <line x1="130" y1="62" x2="155" y2="62" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="0.8s" repeatCount="indefinite"/>
    </line>

    <!-- STT -->
    <rect x="155" y="40" width="85" height="45" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="197" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">Deepgram</text>
    <text x="197" y="72" text-anchor="middle" font-size="9" fill="#1d4ed8">STT</text>

    <!-- Arrow -->
    <line x1="240" y1="62" x2="265" y2="62" stroke="#3b82f6" stroke-width="1.5"/>

    <!-- AI Brain -->
    <rect x="265" y="40" width="85" height="45" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="307" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#4f46e5">AI Brain</text>
    <text x="307" y="72" text-anchor="middle" font-size="9" fill="#4f46e5">generates Q</text>

    <!-- Thinking animation -->
    <g>
      <circle cx="290" cy="95" r="2" fill="#4f46e5">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="300" cy="95" r="2" fill="#4f46e5">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="310" cy="95" r="2" fill="#4f46e5">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Arrow -->
    <line x1="350" y1="62" x2="375" y2="62" stroke="#4f46e5" stroke-width="1.5"/>

    <!-- TTS -->
    <rect x="375" y="40" width="85" height="45" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="417" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">Deepgram</text>
    <text x="417" y="72" text-anchor="middle" font-size="9" fill="#1d4ed8">TTS</text>

    <!-- Waveform animation -->
    <g transform="translate(395, 95)">
      <rect x="0" y="0" width="2" height="8" rx="1" fill="#3b82f6">
        <animate attributeName="height" values="4;10;4" dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="2;-1;2" dur="0.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="5" y="0" width="2" height="8" rx="1" fill="#3b82f6">
        <animate attributeName="height" values="6;3;6" dur="0.6s" begin="0.1s" repeatCount="indefinite"/>
        <animate attributeName="y" values="1;3;1" dur="0.6s" begin="0.1s" repeatCount="indefinite"/>
      </rect>
      <rect x="10" y="0" width="2" height="8" rx="1" fill="#3b82f6">
        <animate attributeName="height" values="4;10;4" dur="0.6s" begin="0.2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="2;-1;2" dur="0.6s" begin="0.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="15" y="0" width="2" height="8" rx="1" fill="#3b82f6">
        <animate attributeName="height" values="6;3;6" dur="0.6s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="y" values="1;3;1" dur="0.6s" begin="0.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="20" y="0" width="2" height="8" rx="1" fill="#3b82f6">
        <animate attributeName="height" values="4;10;4" dur="0.6s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="y" values="2;-1;2" dur="0.6s" begin="0.4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Loop arrow back -->
    <path d="M 460 62 Q 480 62 480 110 Q 480 135 250 135 Q 20 135 20 110 Q 20 85 20 62" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3">
      <animate attributeName="stroke-dashoffset" values="0;-7" dur="2s" repeatCount="indefinite"/>
    </path>
    <text x="250" y="130" text-anchor="middle" font-size="8" fill="#9ca3af">repeat until interview ends</text>
  </g>

  <!-- Bottom row -->
  <!-- Step 5: End -->
  <g filter="url(#shadow)">
    <rect x="20" y="370" width="170" height="70" rx="10" fill="white" stroke="#e5e7eb"/>
    <circle cx="45" cy="390" r="12" fill="url(#indigo)"/>
    <text x="45" y="394" text-anchor="middle" font-size="11" font-weight="700" fill="white">5</text>
    <text x="65" y="393" font-size="12" font-weight="600" fill="#1f2937">Interview Ends</text>
    <text x="30" y="413" font-size="10" fill="#6b7280">Timer expires or manual end</text>
    <text x="30" y="426" font-size="10" fill="#6b7280">Candidate sees "Thank you"</text>
  </g>

  <!-- Arrow -->
  <line x1="190" y1="405" x2="230" y2="405" stroke="#4f46e5" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="230,400 240,405 230,410" fill="#4f46e5"/>

  <!-- Step 6: Auto Score -->
  <g filter="url(#shadow)">
    <rect x="240" y="370" width="170" height="70" rx="10" fill="#fef3c7" stroke="#fde68a"/>
    <circle cx="265" cy="390" r="12" fill="#f59e0b"/>
    <text x="265" y="394" text-anchor="middle" font-size="11" font-weight="700" fill="white">6</text>
    <text x="285" y="393" font-size="12" font-weight="600" fill="#92400e">AI Scores</text>
    <text x="250" y="413" font-size="10" fill="#92400e">Background scorecard</text>
    <text x="250" y="426" font-size="10" fill="#92400e">generation (auto)</text>

    <!-- Spinning gear -->
    <g transform="translate(390, 390)">
      <animateTransform attributeName="transform" type="rotate" from="0 390 390" to="360 390 390" dur="3s" repeatCount="indefinite" additive="sum"/>
      <text font-size="14">⚙</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="410" y1="405" x2="450" y2="405" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="450,400 460,405 450,410" fill="#f59e0b"/>

  <!-- Step 7: Dashboard -->
  <g filter="url(#shadow)">
    <rect x="460" y="365" width="320" height="80" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <circle cx="485" cy="385" r="12" fill="#22c55e"/>
    <text x="485" y="389" text-anchor="middle" font-size="11" font-weight="700" fill="white">7</text>
    <text x="505" y="388" font-size="12" font-weight="600" fill="#15803d">Review on Dashboard</text>

    <!-- Score bars -->
    <rect x="475" y="400" width="60" height="6" rx="3" fill="#dcfce7"/>
    <rect x="475" y="400" width="48" height="6" rx="3" fill="#22c55e">
      <animate attributeName="width" values="0;48" dur="1.5s" fill="freeze"/>
    </rect>
    <text x="540" y="406" font-size="8" fill="#15803d">4.0</text>

    <rect x="475" y="412" width="60" height="6" rx="3" fill="#dcfce7"/>
    <rect x="475" y="412" width="36" height="6" rx="3" fill="#22c55e">
      <animate attributeName="width" values="0;36" dur="1.5s" begin="0.2s" fill="freeze"/>
    </rect>
    <text x="540" y="418" font-size="8" fill="#15803d">3.0</text>

    <rect x="475" y="424" width="60" height="6" rx="3" fill="#dcfce7"/>
    <rect x="475" y="424" width="54" height="6" rx="3" fill="#22c55e">
      <animate attributeName="width" values="0;54" dur="1.5s" begin="0.4s" fill="freeze"/>
    </rect>
    <text x="540" y="430" font-size="8" fill="#15803d">4.5</text>

    <!-- Verdict badge -->
    <rect x="580" y="398" width="50" height="18" rx="9" fill="#22c55e"/>
    <text x="605" y="410" text-anchor="middle" font-size="8" font-weight="600" fill="white">HIRE</text>

    <!-- Labels -->
    <text x="580" y="430" font-size="8" fill="#6b7280">+ transcript</text>
    <text x="580" y="440" font-size="8" fill="#6b7280">+ photos</text>

    <text x="670" y="405" font-size="8" fill="#6b7280">+ proctoring</text>
    <text x="670" y="415" font-size="8" fill="#6b7280">+ evidence</text>
    <text x="670" y="425" font-size="8" fill="#6b7280">+ comparison</text>
  </g>

  <!-- Proctoring sidebar -->
  <g filter="url(#shadow)">
    <rect x="620" y="170" width="160" height="150" rx="10" fill="white" stroke="#fecaca"/>
    <text x="700" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Proctoring Active</text>

    <circle cx="640" cy="210" r="3" fill="#22c55e">
      <animate attributeName="fill" values="#22c55e;#22c55e;#22c55e" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="650" y="213" font-size="9" fill="#374151">Face detection</text>

    <circle cx="640" cy="228" r="3" fill="#22c55e"/>
    <text x="650" y="231" font-size="9" fill="#374151">Eye tracking</text>

    <circle cx="640" cy="246" r="3" fill="#22c55e"/>
    <text x="650" y="249" font-size="9" fill="#374151">Tab monitoring</text>

    <circle cx="640" cy="264" r="3" fill="#22c55e"/>
    <text x="650" y="267" font-size="9" fill="#374151">Screen share</text>

    <circle cx="640" cy="282" r="3" fill="#f59e0b">
      <animate attributeName="fill" values="#22c55e;#f59e0b;#22c55e" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="650" y="285" font-size="9" fill="#374151">Photo capture</text>

    <!-- 4 strike dots -->
    <g transform="translate(640, 300)">
      <circle cx="0" cy="0" r="4" fill="#e5e7eb" stroke="#d1d5db"/>
      <circle cx="12" cy="0" r="4" fill="#e5e7eb" stroke="#d1d5db"/>
      <circle cx="24" cy="0" r="4" fill="#e5e7eb" stroke="#d1d5db"/>
      <circle cx="36" cy="0" r="4" fill="#e5e7eb" stroke="#d1d5db"/>
      <text x="50" y="4" font-size="7" fill="#9ca3af">0/4 strikes</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="400" y="475" text-anchor="middle" font-size="10" fill="#9ca3af">Built with Next.js + TypeScript + PostgreSQL + Deepgram</text>
  <text x="400" y="490" text-anchor="middle" font-size="9" fill="#c7d2fe">github.com/vijaygupta18/ai-interview-platform</text>
</svg>
