<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#4f46e5"/>
  <circle cx="32" cy="32" r="28" fill="#4338ca"/>

  <!-- Video camera body -->
  <rect x="12" y="20" width="28" height="20" rx="4" fill="white" opacity="0.95"/>

  <!-- Camera lens triangle -->
  <polygon points="42,24 52,20 52,40 42,36" fill="white" opacity="0.95"/>

  <!-- AI brain dots (inside camera) -->
  <circle cx="22" cy="28" r="2" fill="#4f46e5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="28" r="2" fill="#4f46e5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="34" cy="28" r="2" fill="#4f46e5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Sound waves -->
  <path d="M22 33 Q26 37 30 33 Q34 29 38 33" stroke="#4f46e5" stroke-width="1.5" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M22 33 Q26 37 30 33 Q34 29 38 33;M22 33 Q26 29 30 33 Q34 37 38 33;M22 33 Q26 37 30 33 Q34 29 38 33" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- Recording dot -->
  <circle cx="50" cy="48" r="5" fill="#ef4444">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
